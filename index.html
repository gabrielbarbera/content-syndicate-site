<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="canonical" href="https://contentsyndicate.net/" />

    <!-- Dynamic noindex for preview domains (executes before React loads) -->
    <script type="module">
      (function () {
        const hostname = window.location.hostname;
        const isPreviewDomain =
          hostname.includes(".vercel.app") ||
          hostname.includes(".preview.") ||
          hostname === "localhost:3000" ||
          hostname.startsWith("localhost:");

        if (isPreviewDomain) {
          const meta = document.createElement("meta");
          meta.name = "robots";
          meta.content = "noindex, nofollow";
          document.head.appendChild(meta);
          console.log("[SEO] Added noindex meta tag for preview domain:", hostname);
        }
      })();
    </script>

    <!-- Primary Meta Tags -->
    <meta name="title" content="Content Syndicate - High-Authority PR Distribution" />
    <meta
      name="description"
      content="Content Syndicate provides high-authority PR distribution services to help brands get noticed. Boost your credibility with placements on Yahoo Finance, Business Insider, MarketWatch, and more."
    />
    <meta
      name="keywords"
      content="PR distribution, press release, content syndication, media placement, high-authority backlinks, SEO, brand visibility, earned media"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://contentsyndicate.net/" />
    <meta property="og:title" content="Content Syndicate - High-Authority PR Distribution" />
    <meta

    <!-- Twitter -->
